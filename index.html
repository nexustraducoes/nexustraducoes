    let currentPage = 1;
    let searchTerm = '';
    let selectedGenre = 'todos';
    let selectedYear = 'todos';
    const gamesPerPage = 25;

    function renderGames() {
      const grid = document.querySelector('.game-grid');
      grid.innerHTML = '';

      // Filtros
      const filtered = games.filter(game => {
        const matchesSearch = game.title.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesGenre = selectedGenre === 'todos' || game.genre === selectedGenre;
        const matchesYear = selectedYear === 'todos' || game.year.toString() === selectedYear;
        return matchesSearch && matchesGenre && matchesYear;
      });

      const totalFiltered = filtered.length;
      const totalPages = Math.ceil(totalFiltered / gamesPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * gamesPerPage;
      const end = start + gamesPerPage;
      const paginated = filtered.slice(start, end);

      if (paginated.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px; font-weight: bold;">Nenhum jogo encontrado para os filtros selecionados.</div>';
      } else {
        paginated.forEach(game => {
          const progColor = game.progress === 100 ? '#10b981' : 'var(--primary-color)';
          const card = document.createElement('div');
          card.className = 'game-card';
          card.onclick = () => window.location.href = 'jogo-' + game.id + '.html';
          
          card.innerHTML = `
            <div class="cover-wrapper">
              <img class="game-cover" src="${game.cover}" alt="Capa de ${game.title}" loading="lazy">
              <span class="game-badge">${game.genre}</span>
            </div>
            <div class="card-content">
              <h3 class="game-title" title="${game.title}">${game.title}</h3>
              <p class="game-meta">${game.developer} • ${game.year}</p>
              
              <div class="progress-container">
                <div class="progress-text">
                  <span>Progresso</span>
                  <span>${game.progress}%</span>
                </div>
                <div class="progress-bar-bg">
                  <div class="progress-bar-fill" style="width: ${game.progress}%; background-color: ${progColor};"></div>
                </div>
              </div>
              
              <div class="card-footer">
                <span class="status-indicator ${game.progress === 100 ? 'complete' : 'pending'}">
                  ${game.progress === 100 ? 'Concluída' : 'Em progresso'}
                </span>
                <span class="download-btn">Ver Detalhes</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const container = document.querySelector('.pagination');
      container.innerHTML = '';
      
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.innerText = i;
        btn.onclick = () => {
          currentPage = i;
          renderGames();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        container.appendChild(btn);
      }
    }

    // Configurando escutas dos filtros
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      currentPage = 1;
      renderGames();
    });

    document.getElementById('genre-filter').addEventListener('change', (e) => {
      selectedGenre = e.target.value;
      currentPage = 1;
      renderGames();
    });

    document.getElementById('year-filter').addEventListener('change', (e) => {
      selectedYear = e.target.value;
      currentPage = 1;
      renderGames();
    });

    // Alternar tema claro / escuro
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.classList.remove('light-theme');
      } else {
        document.documentElement.classList.add('light-theme');
        document.documentElement.classList.remove('dark-theme');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark-theme');
      if (isDark) {
        document.documentElement.classList.remove('dark-theme');
        document.documentElement.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      }
    }

    initTheme();

    // Controle de Lightbox
    function openLightbox(imgSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imgSrc;
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    // Inicialização
    renderGames();
  </script>
</body>
</html>
