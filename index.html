<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS Traduções - Portal de Traduções de Jogos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="portal-container">
    <header class="portal-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 40px;">
      <div style="text-align: left;">
        <div class="nexus-logo-container">
          <h1 class="nexus-logo-main">NEXUS</h1>
          <span class="nexus-logo-sub">traduções</span>
        </div>
        <p class="portal-subtitle">Portal modular de traduções de jogos criadas por fãs</p>
      </div>
      <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()">
        <span>🌓</span> Alternar Tema
      </button>
    </header>

    <!-- Barra de Filtros e Busca Interativa -->
    <div class="controls-bar">
      <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar por nome...">
      <div class="filters-group">
        <select id="genre-filter" class="filter-select">
          <option value="todos">Todos os Gêneros</option>
          <option value="Estratégia">Estratégia</option>
        </select>
        <select id="year-filter" class="filter-select">
          <option value="todos">Todos os Anos</option>
          <option value="2012">2012</option>
        </select>
      </div>
    </div>

    <!-- Grade Horizontal de 5x5 (Máximo de 25 por página) -->
    <main class="game-grid"></main>

    <!-- Paginação -->
    <footer class="pagination-footer">
      <div class="pagination"></div>
    </footer>
  </div>

  <!-- Lightbox para imagens em tela cheia -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" class="lightbox-img" src="" alt="Tela Cheia">
  </div>

  <script>
    // Banco de dados completo dos jogos exportados
    const games = [
  {
    "id": "elden-ring",
    "title": "Thomas Was Alone",
    "cover": "imagens/elden-ring-capa.jpg",
    "link": "https://github.com/exemplo/elden-ring-trad",
    "links": [
      {
        "label": "PC - Steam",
        "url": "https://www.google.com/webhp?hl=pt-BR&ictx=2&sa=X&ved=0ahUKEwjF4Juoq6iVAxWdpJUCHWF7JvAQPQgK&zx=1782594898309"
      }
    ],
    "screenshots": [
      "imagens/elden-ring-sc-1.jpg"
    ],
    "progress": 0,
    "genre": "Estratégia",
    "year": 2012,
    "developer": "Bithell Games",
    "synopsis": "Thomas estava sozinho e, então... bem, ele não estava mais.\n\nThomas Was Alone é um jogo indie de plataforma 2D minimalista sobre amizade, saltos, flutuação e antigravidade. Guie um grupo de retângulos por uma série de obstáculos, combinando suas habilidades distintas para chegar ao final de cada cenário.",
    "changelog": [
      {
        "version": "v1.0",
        "date": "10/11/2025",
        "description": "Lançamento inicial da tradução da campanha base."
      }
    ],
    "supportedVersion": "",
    "translationRelease": "",
    "size": "",
    "notes": "teste"
  }
];

    let currentPage = 1;
    let searchTerm = '';
    let selectedGenre = 'todos';
    let selectedYear = 'todos';
    const gamesPerPage = 25;

    function renderGames() {
      const grid = document.querySelector('.game-grid');
      grid.innerHTML = '';

      // Filtros
      const filtered = games.filter(game => {
        const matchesSearch = game.title.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesGenre = selectedGenre === 'todos' || game.genre === selectedGenre;
        const matchesYear = selectedYear === 'todos' || game.year.toString() === selectedYear;
        return matchesSearch && matchesGenre && matchesYear;
      });

      const totalFiltered = filtered.length;
      const totalPages = Math.ceil(totalFiltered / gamesPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * gamesPerPage;
      const end = start + gamesPerPage;
      const paginated = filtered.slice(start, end);

      if (paginated.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px; font-weight: bold;">Nenhum jogo encontrado para os filtros selecionados.</div>';
      } else {
        paginated.forEach(game => {
          const progColor = game.progress === 100 ? '#10b981' : 'var(--primary-color)';
          const card = document.createElement('div');
          card.className = 'game-card';
          card.onclick = () => window.location.href = 'jogo-' + game.id + '.html';
          
          card.innerHTML = `
            <div class="cover-wrapper">
              <img class="game-cover" src="${game.cover}" alt="Capa de ${game.title}" loading="lazy">
              <span class="game-badge">${game.genre}</span>
            </div>
            <div class="card-content">
              <h3 class="game-title" title="${game.title}">${game.title}</h3>
              <p class="game-meta">${game.developer} • ${game.year}</p>
              
              <div class="progress-container">
                <div class="progress-text">
                  <span>Progresso</span>
                  <span>${game.progress}%</span>
                </div>
                <div class="progress-bar-bg">
                  <div class="progress-bar-fill" style="width: ${game.progress}%; background-color: ${progColor};"></div>
                </div>
              </div>
              
              <div class="card-footer">
                <span class="status-indicator ${game.progress === 100 ? 'complete' : 'pending'}">
                  ${game.progress === 100 ? 'Concluída' : 'Em progresso'}
                </span>
                <span class="download-btn">Ver Detalhes</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const container = document.querySelector('.pagination');
      container.innerHTML = '';
      
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.innerText = i;
        btn.onclick = () => {
          currentPage = i;
          renderGames();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        container.appendChild(btn);
      }
    }

    // Configurando escutas dos filtros
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      currentPage = 1;
      renderGames();
    });

    document.getElementById('genre-filter').addEventListener('change', (e) => {
      selectedGenre = e.target.value;
      currentPage = 1;
      renderGames();
    });

    document.getElementById('year-filter').addEventListener('change', (e) => {
      selectedYear = e.target.value;
      currentPage = 1;
      renderGames();
    });

    // Alternar tema claro / escuro
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.classList.remove('light-theme');
      } else {
        document.documentElement.classList.add('light-theme');
        document.documentElement.classList.remove('dark-theme');
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark-theme');
      if (isDark) {
        document.documentElement.classList.remove('dark-theme');
        document.documentElement.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
      }
    }

    initTheme();

    // Controle de Lightbox
    function openLightbox(imgSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imgSrc;
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    // Inicialização
    renderGames();
  </script>
</body>
</html>
